[colors]
blue = #8fbcbb
green = #a3b18b
pink = #e6946f

background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #e44e4e
disabled = #707880

[bar/mainbar]
;Size
width = 100%
height = 14pt
radius = 0

enable-ipc = true

;Position
;bottom = false

;Colors
background = ${colors.background}
foreground = ${colors.foreground}

; Underline
line-size  = 2
line-color = ${colors.foreground}

; Border
border-size  = 0
border-color = ${colors.background}

; Padding
padding-left  = 0
padding-right = 1

; Margin of modules
module-margin-left  = 0
module-margin-right = 1

; Font
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=9;3"
font-1 = "Noto Color Emoji:scale=12;2"
font-2 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-3 = "JetBrainsMono Nerd Font:style=Bold:size=12;3"
font-4 = "InputSans Nerd Font:style=Regular:size=8;2"

; Modules
modules-left   = i3
modules-center = date
modules-right  = eth wlan brightness pulseaudio cpu battery powermenu

; Cursor actions
cursor-click  = pointer
cursor-scroll = ns-resize


;==============================================================================
[module/brightness]
type = internal/xbacklight

enable-scroll = true

;format = <ramp> <label>
;format = "%{A1:nightlight2:}%{F#F3DE2C}<ramp>%{F-}%{F#282828}<label>%{F-}%{A}"
format = "%{A1:nightlight2:}<ramp> <label>%{A}"

; Tells polybar to listen for left click
; Checks if reshift session is running, if yes then kills the process 
; else shots redshift at warm temperature and forks it into background 

format-background = #8fbcbb
format-foreground = #282828
format-padding = 1

label = %percentage%%

ramp-0 = ūüĆĎ
ramp-1 = ūüĆė
ramp-2 = ūüĆó
ramp-3 = ūüĆĖ
ramp-4 = ūüĆē

;ramp-0 = %{T4}ÓŹē %{T-}
;ramp-1 = %{T4}ÓŹĎ %{T-}
;ramp-2 = %{T4}ÓŹé %{T-}
;ramp-3 = %{T4}ÓŹä %{T-}
;ramp-4 = %{T4}ÓŹ£ %{T-}



;==============================================================================
[module/pulseaudio]
type = internal/pulseaudio

enable-scroll = true

# Sink management
use-ui-max = 

;interval = 5

# Available tags: <label-volume>, <ramp-volume>, <bar-volume>
format-volume = <label-volume>
format-volume-background = #8fbcbb
format-volume-foreground = #282828
format-volume-padding = 1

# Label configuration when audio is active
label-volume = "%{T3}ÔÄ® %{T-} %percentage%%"

# Available tags: <label-muted>
format-muted = <label-muted>
format-muted-background = ${colors.alert}
format-muted-foreground = #282828
format-muted-padding = 1

label-muted = "%{T3}ÓĽ® %{T-} %percentage%%"

click-right = pavucontrol &

;==============================================================================
[module/date]
type = internal/date

interval = 1.0

time = "%H:%M"
# An alternate format when you click the module
time-alt = "%A, %B %d, %Y"

# Available tags: <label> (default)
format = <label>
format-background = #a3b18b
format-foreground = #282828
format-padding = 1

label = "%time%"

;==============================================================================
[module/eth]
type = internal/network
interface = enp2s0

accumulate-stats = true
unknown-as-up = false

interval = 3.0

;format-connected = <label-connected>
format-connected = "%{A1:alacritty --title "nmtui-float" -e nmtui:}<label-connected>%{A}%{A}"
format-connected-background = #a3b18b
format-connected-foreground = #282828
format-connected-padding = 1

;label-connected = "%local_ip%"
; CIDR notation
; ip -o -4 addr show dev enp2s0 | awk '{print $4}'
; On standard home, university, or private local networks, your interface will almost always use a /24 subnet mask (which corresponds to 255.255.255.0).
label-connected = "%local_ip%/24 %{T3}ÓĹĄ %{T-}"

format-disconnected = "%{T3}ÓĹĄ %{T-}DOWN"
format-disconnected-background = #898989
format-disconnected-foreground = #282828
format-disconnected-padding = 1


[module/wlan]
type = internal/network
interface = wlp3s0
interval = 3.0

format-connected = "%{A1:alacritty --title "nmtui-float" -e nmtui:}<label-connected>%{A}%{A}"
format-connected-background = #a3b18b
format-connected-foreground = #282828
format-connected-padding = 1
label-connected = "%local_ip%/24%{T3}ůįĖ©%{T-}"

# When Wi-Fi is disconnected, show the Offline alert
format-disconnected = "%{A1:alacritty --title "nmtui-float" -e nmtui:}<label-disconnected>%{A}%{A}"
format-disconnected-background = #898989
format-disconnected-foreground = #282828
format-disconnected-padding = 1
label-disconnected = "%{T3}ůįĖ© %{T-}DOWN"


;==============================================================================
[module/powermenu]
type = custom/text

content = "%{T4}ůįź•%{T-}"

content-background = #282828
content-foreground = #ea6962
content-padding = 0

click-left = powermenu

;==============================================================================
[module/lock]
type = custom/text

content = "%{T3}Óô≤%{T-}"
content-background = #282828
content-foreground = #a3b18b
content-padding = 0

click-left = 


;==============================================================================
[module/cpu]
type = internal/cpu

interval = 3

; Standard Load
format = <label>
format-background = #a3b18b
format-foreground = #282828
format-padding = 1

label = "%{T3}Ôíľ %{T-}%percentage%%"

; Load Spike Warning: >80%
format-warn = <label-warn>
format-warn-background = #ea6962
format-warn-foreground = #282828
format-warn-padding = 1

label-warn = "%{T3}Ôíľ %{T-}%percentage%%"


;==============================================================================
[module/battery]
type = internal/battery

full-at = 99
low-at = 20

; Physical Hardware Architecture
; ls /sys/class/power_supply/
battery = BAT0
adapter = AC

poll-interval = 2

format-charging = <label-charging>
format-charging-background = #a3b18b
format-charging-foreground = #282828
format-charging-padding = 1
; label-charging = "ůĪźč %percentage%%"
label-charging = "ůĪźč"

format-full = <label-full>
format-full-background = #a3b18b
format-full-foreground = #282828
format-full-padding = 1
; label-full = "ůĪźč %percentage%%"
label-full = "ůĪźč"

format-discharging = <label-discharging>
format-discharging-background = #ea6962
format-discharging-foreground = #282828
format-discharging-padding = 1
label-discharging = "ůĪźč UNPLUGGED"

format-low = <label-low>
format-low-background = #ea6962
format-low-foreground = #282828
format-low-padding = 1
label-low = "ůĪźč UNPLUGGED"


;==============================================================================
[module/i3]
type = internal/i3

; Only show workspaces defined on the current physical monitor
pin-workspaces = true

enable-click = true
enable-scroll = false

; Sort
index-sort = true

; Display clean icons by extracting numbers (if set true)
fuzzy-match = false

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5
ws-icon-5 = 6;6
ws-icon-6 = 7;7
ws-icon-7 = 8;8
ws-icon-8 = 9;
ws-icon-9 = 10;
ws-icon-default = 


; Focused Workspace 
format = <label-state> <label-mode>

label-focused = %icon%
label-focused-background = #a3b18b
label-focused-foreground = #282828
label-focused-padding = 1

; Unfocused Workspace
label-unfocused = %icon%
label-unfocused-background = #282828
label-unfocused-foreground = #7c6f64
label-unfocused-padding = 1

; Visible Workspace
label-visible = %icon%
label-visible-background = #32302f
label-visible-foreground = #a89984
label-visible-padding = 1

; Urgent Workspace
label-urgent = %icon%
label-urgent-background = #ea6962
label-urgent-foreground = #282828
label-urgent-padding = 1

; Display Manager Modes
label-mode = %mode%
label-mode-padding = 1
label-mode-background = #fe8019
label-mode-foreground = #282828


;==============================================================================
[module/xwindow]
type = internal/xwindow

; trailing truncation indicator
;label-ellipsis = true

format = <label>
format-background = #282828
format-foreground = #898989
format-padding = 1

label = "%{T5}%title%%{T-}"
label-max-len = 40
label-empty = "%{T4}ůį£á %{T-}"
label-empty-foreground = #a3b18b
