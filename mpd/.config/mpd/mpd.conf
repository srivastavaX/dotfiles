# Core Directories
music_directory    "/home/srivastava/Media/music"

playlist_directory "/home/srivastava/.config/mpd/playlists"
db_file            "/home/srivastava/.config/mpd/database"
state_file         "/home/srivastava/.config/mpd/state"
sticker_file       "/home/srivastava/.config/mpd/sticker.sql"


# Connection - Unix Socket (recommended for local use)
#bind_to_address    "~/.config/mpd/socket"

# Optionally also enable TCP for compatibility
bind_to_address    "127.0.0.1"
port               "6600"

# Audio Output - ALSA (adjust if using PulseAudio/PipeWire)
audio_output {
    type           "pulse"
    name           "PulseAudio Output"
}

# Fallback for visualization or network streaming
audio_output {
    type           "fifo"
    name           "FIFO Output"
    path           "/tmp/mpd.fifo"
    format         "44100:16:2"
}

# Performance
auto_update        "yes"
restore_paused     "yes"
max_output_buffer_size "16384"

# Logging (comment out after setup)
log_file           "syslog"
